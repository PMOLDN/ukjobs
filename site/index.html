<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UK Job Market Visualizer</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <section class="hero">
    <div class="hero-top">
      <div>
        <div class="eyebrow" id="eyebrow">Loading dataset</div>
        <h1 id="heroTitle">UK Job Market Visualizer</h1>
        <p id="heroText"></p>
      </div>
      <div class="hero-links">
        <a href="https://www.ons.gov.uk/" target="_blank" rel="noreferrer">ONS</a>
        <a href="https://github.com/karpathy/jobs" target="_blank" rel="noreferrer">Original repo</a>
      </div>
    </div>

	    <div class="hero-grid">
	      <div class="panel summary">
	        <h2>At A Glance</h2>
	        <div class="summary-grid" id="summaryGrid"></div>
	      </div>
	    </div>
	  </section>
	
	  <div class="controls">
	    <div class="control-row">
	      <div class="mode-buttons" id="modeButtons"></div>
	      <div class="layer-options" id="layerOptions"></div>
	    </div>
	    <div class="legend">
	      <span id="legendLow"></span>
	      <canvas id="legendCanvas" width="130" height="10"></canvas>
	      <span id="legendHigh"></span>
	    </div>
  </div>

  <div class="search-bar">
    <span class="search-icon">&#x1F50D;</span>
    <input
      type="text"
      id="searchInput"
      placeholder="Search occupations by title, SOC code, or industry…  ( / )"
      autocomplete="off"
      spellcheck="false"
    >
    <span class="search-count" id="searchCount"></span>
    <button class="search-clear" id="searchClear" aria-label="Clear search">&times;</button>
  </div>

  <section class="panel stats">
    <h2 id="statsTitle">Current Layer</h2>
    <div class="stats-grid" id="statsGrid"></div>
  </section>

  <section class="canvas-shell">
    <canvas id="canvas"></canvas>
    <div class="canvas-caption" id="canvasCaption"></div>
  </section>
</div>

<div id="tooltip">
  <div class="tt-title"></div>
  <div class="tt-code"></div>
  <div class="tt-grid"></div>
  <div class="tt-top"></div>
</div>

<div id="detailBackdrop"></div>
<aside id="detailPanel">
  <header class="dp-header">
    <div>
      <div class="dp-title" id="dpTitle"></div>
      <div class="dp-code" id="dpCode"></div>
    </div>
    <button class="dp-close" id="dpClose" aria-label="Close panel">&times;</button>
  </header>

  <div class="dp-body" id="dpBody">
    <div class="dp-metrics" id="dpMetrics"></div>

    <section class="dp-section">
      <h3>Employment Trend</h3>
      <canvas id="dpSparkline" width="360" height="90"></canvas>
    </section>

    <section class="dp-section">
      <h3>Top Industries</h3>
      <div id="dpIndustries"></div>
    </section>

    <section class="dp-section" id="dpAiSection">
      <h3>AI Exposure <span id="dpAiScore"></span></h3>
      <p id="dpAiRationale"></p>
    </section>

    <section class="dp-section" id="dpRegionalSection">
      <h3>Regional Breakdown</h3>
      <div id="dpRegional"></div>
    </section>
  </div>
</aside>

<script src="treemap.js"></script>
<script src="ui.js"></script>
</body>
</html>
